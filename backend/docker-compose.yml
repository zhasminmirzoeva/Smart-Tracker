version: "3.9"

services:
  db:
    image: postgres:16
    container_name: expiry_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: expiry_api
    env_file: .env
    environment:
      - PYTHONPATH=/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    expose:
      - "8000"
    volumes:
      - ./:/app
    command: ["uvicorn", "app.main:app", "--app-dir", "/app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  db_data: